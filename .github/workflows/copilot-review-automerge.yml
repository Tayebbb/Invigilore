name: Auto Resolve & Merge PR

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

jobs:
  resolve-and-merge:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config core.editor true
          git config sequence.editor true

      - name: Rebase onto main and auto-resolve conflicts
        run: |
          set -euo pipefail

          PR_BRANCH="${{ github.head_ref }}"
          git fetch origin main
          git checkout "$PR_BRANCH"

          git rebase origin/main || true

          # Loop until rebase fully done
          while git rev-parse --verify REBASE_HEAD >/dev/null 2>&1; do
            CONFLICTS=$(git diff --name-only --diff-filter=U || true)

            if [ -n "$CONFLICTS" ]; then
              echo "Auto-resolving conflicts by keeping PR branch version:"
              echo "$CONFLICTS"
              echo "$CONFLICTS" | xargs -I{} git checkout --theirs {}
              echo "$CONFLICTS" | xargs git add
            fi

            # Continue rebase with automatic message
            git rebase --continue -m "Auto-resolved merge conflicts" || true
          done

          git push origin "$PR_BRANCH" --force-with-lease
          echo "✅ Branch pushed successfully."

      - name: Merge pull request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = context.payload.pull_request.number;
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr_number,
                merge_method: 'squash',
                commit_title: `Auto-merged PR #${pr_number}: ${context.payload.pull_request.title}`,
                commit_message: 'Automatically merged via GitHub Actions.',
              });
              console.log(`PR #${pr_number} merged successfully.`);
            } catch (err) {
              core.setFailed(`Merge failed: ${err.message}`);
            }

      - name: Delete merged branch
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${{ github.head_ref }}`
              });
              console.log(`Branch '${{ github.head_ref }}' deleted.`);
            } catch (err) {
              console.log(`Could not delete branch: ${err.message}`);
            }