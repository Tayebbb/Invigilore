name: Auto Resolve & Merge PR

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GIT_EDITOR: true
  GIT_SEQUENCE_EDITOR: true

jobs:
  resolve-and-merge:
    name: Resolve Conflicts & Merge
    runs-on: ubuntu-latest

    # This workflow can only push back to branches in the same repository.
    if: github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config core.editor true
          git config sequence.editor true

      - name: Rebase onto main and auto-resolve real conflicts
        run: |
          set -euo pipefail

          PR_BRANCH="${{ github.head_ref }}"
          echo "Rebasing ${PR_BRANCH} onto origin/main..."

          git fetch origin main
          git checkout "${PR_BRANCH}"

          if git rebase origin/main; then
            echo "Rebase succeeded with no conflicts."
          else
            echo "Rebase stopped. Checking for actual conflicted files..."

            while true; do
              CONFLICT_FILES="$(git diff --name-only --diff-filter=U || true)"

              if [ -z "$CONFLICT_FILES" ]; then
                echo "Rebase failed, but no conflicted files were found. Aborting."
                git rebase --abort || true
                exit 1
              fi

              echo "Auto-resolving these files by keeping the PR branch version:"
              echo "$CONFLICT_FILES"

              while IFS= read -r file; do
                [ -z "$file" ] && continue
                git checkout --theirs -- "$file"
                git add -- "$file"
              done <<< "$CONFLICT_FILES"

              if git rebase --continue; then
                echo "Rebase continued successfully."
                break
              fi

              echo "Rebase is still in progress. Checking for more conflicts..."
            done
          fi

          git push origin "${PR_BRANCH}" --force-with-lease
          echo "Branch pushed successfully."

      - name: Merge pull request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = context.payload.pull_request.number;

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr_number,
                merge_method: 'squash',
                commit_title: `Auto-merged PR #${pr_number}: ${context.payload.pull_request.title}`,
                commit_message: 'Automatically merged via GitHub Actions.',
              });

              console.log(`PR #${pr_number} merged successfully.`);
            } catch (err) {
              core.setFailed(`Merge failed: ${err.message}`);
            }

      - name: Delete merged branch
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${{ github.head_ref }}`
              });
              console.log(`Branch '${{ github.head_ref }}' deleted.`);
            } catch (err) {
              console.log(`Could not delete branch: ${err.message}`);
            }