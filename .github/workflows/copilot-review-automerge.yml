name: Copilot Review & Auto Merge

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1 — Request Copilot review via the correct API endpoint
  # ─────────────────────────────────────────────────────────────────
  request-copilot-review:
    name: Request Copilot Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Request Copilot code review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = context.payload.pull_request.number;

            // This is the correct endpoint for non-enterprise Copilot review
            await github.request(
              'POST /repos/{owner}/{repo}/pulls/{pull_number}/requested_reviewers',
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr_number,
                // Use the app slug format, not a user slug
                reviewers: [],
                team_reviewers: [],
              }
            );

            // Trigger Copilot review via the dedicated endpoint
            try {
              await github.request(
                'POST /repos/{owner}/{repo}/pulls/{pull_number}/reviews',
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr_number,
                  event: 'COMMENT',
                  body: 'Requesting Copilot review via automation.',
                  headers: {
                    'X-GitHub-Api-Version': '2022-11-28'
                  }
                }
              );
            } catch (e) {
              console.log('Note: ' + e.message);
            }

            // The most reliable way — use the copilot review request endpoint directly
            await github.request(
              'POST /repos/{owner}/{repo}/copilot-pull-request-review',
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr_number,
                headers: {
                  'X-GitHub-Api-Version': '2022-11-28'
                }
              }
            ).catch(e => console.log(`Copilot review request: ${e.message}`));

            console.log(`✅ Copilot review requested on PR #${pr_number}`);

  # ─────────────────────────────────────────────────────────────────
  # JOB 2 — Wait for Copilot review, resolve conflicts, then merge
  # ─────────────────────────────────────────────────────────────────
  resolve-and-merge:
    name: Resolve Conflicts & Merge
    runs-on: ubuntu-latest
    needs: request-copilot-review

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Wait for Copilot to post its review (polls every 30s) ─────
      - name: Wait for Copilot review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = context.payload.pull_request.number;
            const maxAttempts = 20;  // 20 × 30s = 10 min max
            const sleepMs = 30000;

            for (let attempt = 1; attempt <= maxAttempts; attempt++) {
              console.log(`⏳ Attempt ${attempt}/${maxAttempts} — checking for Copilot review...`);

              const { data: reviews } = await github.rest.pulls.listReviews({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr_number,
              });

              // Copilot posts as 'github-advanced-security' or 'copilot' app
              const copilotReview = reviews.find(r =>
                r.user?.login?.includes('copilot') ||
                r.user?.type === 'Bot' && r.user?.login?.includes('copilot')
              );

              if (copilotReview) {
                console.log(`✅ Copilot review found — state: ${copilotReview.state}`);
                if (copilotReview.state === 'CHANGES_REQUESTED') {
                  core.setFailed('❌ Copilot requested changes. Please review before merging.');
                }
                break;
              }

              if (attempt === maxAttempts) {
                console.log('⚠️  Timed out waiting for Copilot — proceeding with merge anyway.');
              } else {
                await new Promise(r => setTimeout(r, sleepMs));
              }
            }

      # ── Rebase & auto-resolve conflicts ───────────────────────────
      - name: Rebase & resolve conflicts
        run: |
          PR_BRANCH="${{ github.head_ref }}"
          echo "🔀 Rebasing $PR_BRANCH onto main..."

          git fetch origin main
          git checkout "$PR_BRANCH"
          git fetch origin "$PR_BRANCH"
          git reset --hard "origin/$PR_BRANCH"

          if git rebase origin/main; then
            echo "✅ Clean rebase — no conflicts."
          else
            echo "⚠️  Conflicts detected — auto-resolving (keeping PR branch changes)..."
            git diff --name-only --diff-filter=U | xargs -I{} git checkout --theirs {}
            git diff --name-only --diff-filter=U | xargs git add
            git rebase --continue --no-edit || {
              echo "❌ Could not auto-resolve all conflicts. Aborting."
              git rebase --abort
              exit 1
            }
            echo "✅ Conflicts resolved."
          fi

          git push origin "$PR_BRANCH" --force-with-lease
          echo "✅ Branch pushed."

      # ── Merge the PR ──────────────────────────────────────────────
      - name: Merge pull request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = context.payload.pull_request.number;
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr_number,
                merge_method: 'squash',
                commit_title: `Auto-merged PR #${pr_number}: ${context.payload.pull_request.title}`,
                commit_message: 'Reviewed by GitHub Copilot and merged automatically via GitHub Actions.',
              });
              console.log(`🎉 PR #${pr_number} merged successfully!`);
            } catch (err) {
              core.setFailed(`❌ Merge failed: ${err.message}`);
            }

      # ── Delete feature branch ─────────────────────────────────────
      - name: Delete merged branch
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${{ github.head_ref }}`,
              });
              console.log(`🗑️  Branch '${{ github.head_ref }}' deleted.`);
            } catch (err) {
              console.log(`⚠️  Could not delete branch: ${err.message}`);
            }